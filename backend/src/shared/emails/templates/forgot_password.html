<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Your Password</title>
  </head>
  <body style="margin:0; padding:0; background-color:#f4f4f4; font-family:Arial, sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f4; padding: 40px 0;">
      <tr>
        <td align="center">
          <table width="100%" max-width="500" cellpadding="0" cellspacing="0" style="background-color:#ffffff; border-radius:8px; overflow:hidden; box-shadow:0 0 10px rgba(0,0,0,0.1);">
            <tr>
              <td align="center" style="padding: 30px 20px 10px;">
                <img
                  src="https://res.cloudinary.com/djnelmdc7/image/upload/v1752228105/Shoppix-logo_j03sbv.png"
                  alt="Shoppix Logo"
                  width="100"
                  style="display:block; margin: 0 auto 20px;"
                />
                <h1 style="color:#333; margin-bottom: 10px;">Reset Your Password</h1>
                <p style="color:#666; font-size: 16px; margin-bottom: 20px;">
                  Use the 6-digit code below to reset your password:
                </p>
                <div style="font-size: 28px; font-weight: bold; color: #00A991; letter-spacing: 8px; background: #f0f0f0; padding: 12px 20px; border-radius: 6px; display: inline-block;">
                  {{OTP_CODE}}
                </div>
                <p style="color:#666; font-size: 14px; margin-top: 30px;">
                  This code will expire in 10 minutes. If you did not request a password reset, you can safely ignore this email.
                </p>
                <p style="color:#999; font-size: 13px; margin-top: 40px;">
                  — The Shoppix Team
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
